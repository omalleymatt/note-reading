<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Reader</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;
    font-family: Georgia, 'Times New Roman', serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
  }

  #prompt-screen {
    position: fixed;
    inset: 0;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 44px;
    z-index: 100;
    padding: 40px;
  }

  #prompt-screen.hidden { display: none; }

  #prompt-label {
    font-size: clamp(40px, 7vw, 80px);
    font-weight: bold;
    color: #111;
    text-align: center;
    line-height: 1.15;
  }

  #prompt-sublabel {
    font-size: clamp(20px, 3vw, 36px);
    color: #444;
    text-align: center;
    margin-top: -24px;
  }

  #prompt-input {
    font-size: clamp(44px, 7vw, 90px);
    font-family: 'Courier New', monospace;
    padding: 18px 32px;
    border: 5px solid #111;
    border-radius: 8px;
    width: min(92vw, 860px);
    background: #fff;
    color: #111;
    letter-spacing: 5px;
    text-align: center;
    outline: none;
  }

  #prompt-input:focus {
    box-shadow: 0 0 0 5px rgba(0,0,0,0.13);
  }

  #prompt-error {
    font-size: clamp(18px, 2.5vw, 30px);
    color: #cc0000;
    text-align: center;
    min-height: 1.4em;
    font-weight: bold;
  }

  #prompt-btn {
    font-size: clamp(26px, 4vw, 52px);
    font-family: Georgia, serif;
    padding: 18px 64px;
    border: 4px solid #111;
    border-radius: 8px;
    background: #111;
    color: #fff;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 2px;
  }

  #prompt-btn:hover { background: #333; }

  #prompt-hint {
    font-size: clamp(16px, 2vw, 24px);
    color: #888;
    text-align: center;
    margin-top: -20px;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  #app.hidden { display: none; }

  #controls {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 24px;
    background: #f5f5f0;
    border-bottom: 2px solid #111;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  #controls button {
    font-size: 18px;
    font-family: Georgia, serif;
    padding: 8px 22px;
    border: 2.5px solid #111;
    border-radius: 4px;
    background: #111;
    color: #fff;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 1px;
  }

  #controls button:hover { background: #333; }
  #controls button.secondary { background: #fff; color: #111; }
  #controls button.secondary:hover { background: #eee; }

  #info-display {
    font-size: 16px;
    color: #444;
    font-family: Georgia, serif;
  }

  #staff-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>

<div id="prompt-screen">
  <div id="prompt-label">What tempo?</div>
  <div id="prompt-sublabel">Enter beats per minute</div>
  <input id="prompt-input" type="text" inputmode="numeric" placeholder="60" autocomplete="off" spellcheck="false" />
  <div id="prompt-error"></div>
  <button id="prompt-btn">Next →</button>
  <div id="prompt-hint">Press Enter or tap Next</div>
</div>

<div id="app" class="hidden">
  <div id="controls">
    <button id="play-btn" class="secondary">▶ Play (Space)</button>
    <button id="reset-btn" class="secondary">↺ Reset</button>
    <span id="info-display"></span>
    <button id="restart-btn" style="margin-left:auto;">✎ New melody</button>
  </div>
  <div id="staff-container">
    <canvas id="staff-canvas"></canvas>
  </div>
</div>

<script>
const STEPS = ['tempo', 'melody'];
let stepIndex = 0;
let collectedTempo = 60;

const promptScreen = document.getElementById('prompt-screen');
const promptLabel = document.getElementById('prompt-label');
const promptSublabel = document.getElementById('prompt-sublabel');
const promptInput = document.getElementById('prompt-input');
const promptBtn = document.getElementById('prompt-btn');
const promptError = document.getElementById('prompt-error');
const appDiv = document.getElementById('app');

const PROMPT_CONFIG = {
  tempo: {
    label: 'What tempo?',
    sublabel: 'Enter beats per minute',
    placeholder: '60',
    hint: 'Press Enter or tap Next',
    inputmode: 'numeric'
  },
  melody: {
    label: 'Type your melody.',
    sublabel: 'e.g.   C D E F G   or   C4 D4 E5 F5',
    placeholder: 'C D E F G',
    hint: 'Separate notes with spaces. Press Enter when done.',
    inputmode: 'text'
  }
};

function showStep(step) {
  const cfg = PROMPT_CONFIG[step];
  promptLabel.textContent = cfg.label;
  promptSublabel.textContent = cfg.sublabel;
  promptInput.placeholder = cfg.placeholder;
  promptInput.setAttribute('inputmode', cfg.inputmode);
  promptInput.value = '';
  promptError.textContent = '';
  promptBtn.textContent = step === 'melody' ? 'Play →' : 'Next →';
  setTimeout(() => promptInput.focus(), 60);
}

function advancePrompt() {
  const step = STEPS[stepIndex];
  const val = promptInput.value.trim();

  if (step === 'tempo') {
    const n = parseInt(val);
    if (!val || isNaN(n) || n < 20 || n > 240) {
      promptError.textContent = 'Please enter a number between 20 and 240.';
      promptInput.focus();
      return;
    }
    collectedTempo = n;
    stepIndex++;
    showStep(STEPS[stepIndex]);
  } else if (step === 'melody') {
    const parsed = parseInput(val);
    if (parsed.length === 0) {
      promptError.textContent = 'No valid notes found. Try:  C D E F G';
      promptInput.focus();
      return;
    }
    launchApp(collectedTempo, parsed);
  }
}

promptBtn.addEventListener('click', advancePrompt);
promptInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); advancePrompt(); }
});

function launchApp(bpm, parsed) {
  promptScreen.classList.add('hidden');
  appDiv.classList.remove('hidden');
  tempoValue = bpm;
  beatDuration = 60000 / bpm;
  document.getElementById('info-display').textContent =
    'Tempo: ' + bpm + ' BPM  ·  ' + parsed.length + ' note' + (parsed.length !== 1 ? 's' : '');
  resize();
  buildNotes(parsed);
}

document.getElementById('restart-btn').addEventListener('click', () => {
  isPlaying = false;
  worldOffset = 0;
  appDiv.classList.add('hidden');
  promptScreen.classList.remove('hidden');
  stepIndex = 0;
  showStep(STEPS[0]);
});

// ── Note definitions ──────────────────────────────────────────────
const NOTE_STEPS = {
  'C4': -2, 'D4': -1, 'E4': 0,  'F4': 1,  'G4': 2,
  'A4': 3,  'B4': 4,  'C5': 5,  'D5': 6,  'E5': 7,
  'F5': 8,  'G5': 9,  'A5': 10, 'B5': 11, 'C6': 12
};

const DEFAULT_OCTAVE = {
  'C': 5, 'D': 5, 'E': 4, 'F': 4, 'G': 4, 'A': 4, 'B': 4
};

function parseInput(str) {
  const tokens = str.trim().toUpperCase().split(/[\s,]+/).filter(Boolean);
  const result = [];
  for (const tok of tokens) {
    const letter = tok[0];
    if (!'CDEFGAB'.includes(letter)) continue;
    const octave = tok.length > 1 ? parseInt(tok.slice(1)) : DEFAULT_OCTAVE[letter];
    const key = letter + octave;
    if (NOTE_STEPS.hasOwnProperty(key)) result.push({ step: NOTE_STEPS[key] });
  }
  return result;
}

// ── Canvas / layout ────────────────────────────────────────────────
const canvas = document.getElementById('staff-canvas');
const ctx = canvas.getContext('2d');
let W, H, staffTop, staffBottom, lineSpacing, noteRadius, playheadX, pixelsPerBeat;
const NUM_LINES = 5;
const NOTE_SPACING_BEATS = 1.5;

function resize() {
  W = canvas.offsetWidth;
  H = canvas.offsetHeight;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const staffHeight = H * 0.55;
  const staffCenter = H * 0.48;
  staffTop    = staffCenter - staffHeight / 2;
  staffBottom = staffCenter + staffHeight / 2;
  lineSpacing = staffHeight / (NUM_LINES - 1);
  noteRadius  = lineSpacing * 0.55;
  playheadX   = W / 3;
  pixelsPerBeat = lineSpacing * NOTE_SPACING_BEATS * 2;
  draw();
}

// ── Playback state ─────────────────────────────────────────────────
let notes = [];
let worldOffset = 0;
let isPlaying = false;
let lastTimestamp = null;
let beatDuration = 1000;
let tempoValue = 60;

function buildNotes(parsed) {
  notes = parsed.map((n, i) => ({ step: n.step, x: i * pixelsPerBeat }));
  worldOffset = 0;
  isPlaying = false;
  lastTimestamp = null;
  document.getElementById('play-btn').textContent = '▶ Play (Space)';
  draw();
}

// ── Drawing ────────────────────────────────────────────────────────
function staffY(step) {
  return staffBottom - step * (lineSpacing / 2);
}

function draw() {
  if (!W) return;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);
  drawStaff();
  drawBarLines();
  drawNotes();
//  drawPlayheadLine();
}

function drawStaff() {
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 12;
  for (let i = 0; i < NUM_LINES; i++) {
    const y = staffBottom - i * lineSpacing;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
}

function drawBarLines() {
  const barWidth = pixelsPerBeat * 4;
  const firstBarWorld = -pixelsPerBeat * 0.5;
  const startWorld = worldOffset - playheadX - barWidth;
  const endWorld   = worldOffset - playheadX + W + barWidth;
  const startBar = Math.floor((startWorld - firstBarWorld) / barWidth);
  const endBar   = Math.ceil((endWorld   - firstBarWorld) / barWidth);
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 12;
  for (let b = startBar; b <= endBar; b++) {
    const screenX = (firstBarWorld + b * barWidth) - worldOffset + playheadX;
    ctx.beginPath();
    ctx.moveTo(screenX, staffTop);
    ctx.lineTo(screenX, staffBottom);
    ctx.stroke();
  }
}

function drawPlayheadLine() {
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 6]);
  ctx.beginPath();
  ctx.moveTo(playheadX, staffTop  - lineSpacing * 2);
  ctx.lineTo(playheadX, staffBottom + lineSpacing * 2);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawNotes() {
  for (const note of notes) {
    const screenX = note.x - worldOffset + playheadX;
    if (screenX < -noteRadius * 4 || screenX > W + noteRadius * 4) continue;
    drawQuarterNote(screenX, staffY(note.step), note.step);
  }
}

function drawQuarterNote(x, y, step) {
  const r = noteRadius;
  if (step <= -2) {
    for (let s = -2; s >= step; s -= 2) {
      ctx.strokeStyle = '#111'; ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(x - r * 1.7, staffY(s));
      ctx.lineTo(x + r * 1.7, staffY(s));
      ctx.stroke();
    }
  }
  if (step >= 10) {
    for (let s = 10; s <= step; s += 2) {
      ctx.strokeStyle = '#111'; ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(x - r * 1.7, staffY(s));
      ctx.lineTo(x + r * 1.7, staffY(s));
      ctx.stroke();
    }
  }
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(-0.2);
  ctx.beginPath();
  ctx.ellipse(0, 0, r * 1.15, r * 0.82, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#111';
  ctx.fill();
  ctx.restore();
  const stemHeight = lineSpacing * 3.5;
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 3.5;
  ctx.beginPath();
  if (step >= 4) {
    ctx.moveTo(x - r * 0.9, y + r * 0.4);
    ctx.lineTo(x - r * 0.9, y + stemHeight);
  } else {
    ctx.moveTo(x + r * 0.9, y - r * 0.4);
    ctx.lineTo(x + r * 0.9, y - stemHeight);
  }
  ctx.stroke();
}

// ── Playback ───────────────────────────────────────────────────────
function togglePlay() {
  if (!notes.length) return;
  isPlaying = !isPlaying;
  document.getElementById('play-btn').textContent = isPlaying ? '⏸ Pause (Space)' : '▶ Play (Space)';
  if (isPlaying) { lastTimestamp = null; requestAnimationFrame(tick); }
}

function tick(ts) {
  if (!isPlaying) return;
  if (lastTimestamp === null) lastTimestamp = ts;
  const dt = ts - lastTimestamp;
  lastTimestamp = ts;
  worldOffset += dt * (pixelsPerBeat / beatDuration);
  const last = notes[notes.length - 1];
  if (last && (last.x - worldOffset + playheadX) < -noteRadius * 6) {
    isPlaying = false;
    document.getElementById('play-btn').textContent = '▶ Play (Space)';
    worldOffset = 0;
    draw();
    return;
  }
  draw();
  requestAnimationFrame(tick);
}

document.getElementById('play-btn').addEventListener('click', togglePlay);
document.getElementById('reset-btn').addEventListener('click', () => {
  isPlaying = false; worldOffset = 0; lastTimestamp = null;
  document.getElementById('play-btn').textContent = '▶ Play (Space)';
  draw();
});

window.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
    e.preventDefault(); togglePlay();
  }
});

window.addEventListener('resize', () => {
  if (!appDiv.classList.contains('hidden')) resize();
});

// ── Init ───────────────────────────────────────────────────────────
showStep(STEPS[0]);
</script>
</body>
</html>
