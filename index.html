<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Reader</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;
    font-family: Georgia, 'Times New Roman', serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
  }

  #prompt-screen {
    position: fixed;
    inset: 0;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 44px;
    z-index: 100;
    padding: 40px;
  }
  #prompt-screen.hidden { display: none; }

  #prompt-label {
    font-size: clamp(40px, 7vw, 80px);
    font-weight: bold;
    color: #111;
    text-align: center;
    line-height: 1.15;
  }

  #prompt-sublabel {
    font-size: clamp(20px, 3vw, 36px);
    color: #444;
    text-align: center;
    margin-top: -24px;
  }

  #prompt-input {
    font-size: clamp(44px, 7vw, 90px);
    font-family: 'Courier New', monospace;
    padding: 18px 32px;
    border: 5px solid #111;
    border-radius: 8px;
    width: min(92vw, 860px);
    background: #fff;
    color: #111;
    letter-spacing: 5px;
    text-align: center;
    outline: none;
  }
  #prompt-input:focus { box-shadow: 0 0 0 5px rgba(0,0,0,0.13); }

  #melody-step {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    width: min(92vw, 860px);
  }
  #melody-step.visible { display: flex; }

  #melody-select {
    font-size: clamp(26px, 4vw, 48px);
    font-family: Georgia, serif;
    padding: 14px 24px;
    border: 5px solid #111;
    border-radius: 8px;
    width: 100%;
    background: #fff;
    color: #111;
    cursor: pointer;
    outline: none;
  }

  .or-divider {
    font-size: clamp(18px, 2.5vw, 28px);
    color: #888;
    font-style: italic;
  }

  #prompt-input-melody {
    font-size: clamp(36px, 5.5vw, 72px);
    font-family: 'Courier New', monospace;
    padding: 18px 32px;
    border: 5px solid #111;
    border-radius: 8px;
    width: 100%;
    color: #111;
    letter-spacing: 5px;
    text-align: center;
    outline: none;
  }

  #prompt-error {
    font-size: clamp(18px, 2.5vw, 30px);
    color: #cc0000;
    text-align: center;
    min-height: 1.4em;
    font-weight: bold;
  }

  #prompt-btn {
    font-size: clamp(26px, 4vw, 52px);
    font-family: Georgia, serif;
    padding: 18px 64px;
    border: 4px solid #111;
    border-radius: 8px;
    background: #111;
    color: #fff;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 2px;
  }
  #prompt-btn:hover { background: #333; }

  #prompt-hint {
    font-size: clamp(16px, 2vw, 24px);
    color: #888;
    text-align: center;
    margin-top: -20px;
  }

  #app { display: flex; flex-direction: column; height: 100vh; }
  #app.hidden { display: none; }

  #controls {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 24px;
    background: #f5f5f0;
    border-bottom: 2px solid #111;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  #controls button {
    font-size: 18px;
    font-family: Georgia, serif;
    padding: 8px 22px;
    border: 2.5px solid #111;
    border-radius: 4px;
    background: #111;
    color: #fff;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 1px;
  }
  #controls button:hover { background: #333; }
  #controls button.secondary { background: #fff; color: #111; }
  #controls button.secondary:hover { background: #eee; }

  #info-display { font-size: 16px; color: #444; font-family: Georgia, serif; }

  #staff-container { flex: 1; position: relative; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>

<div id="prompt-screen">
  <div id="prompt-label">What tempo?</div>
  <div id="prompt-sublabel">Enter beats per minute</div>
  <input id="prompt-input" type="text" inputmode="numeric" placeholder="60" autocomplete="off" spellcheck="false" />

  <div id="melody-step">
    <select id="melody-select">
      <option value="">— choose a saved melody —</option>
    </select>
    <div class="or-divider">— or type your own —</div>
    <input id="prompt-input-melody" type="text"
      placeholder="C D E F G"
      autocomplete="off" spellcheck="false" />
  </div>

  <div id="prompt-error"></div>
  <button id="prompt-btn">Next →</button>
  <div id="prompt-hint">Press Enter or tap Next</div>
</div>

<div id="app" class="hidden">
  <div id="controls">
    <button id="play-btn" class="secondary">▶ Play (Space)</button>
    <button id="reset-btn" class="secondary">↺ Reset</button>
    <span id="info-display"></span>
    <button id="restart-btn" style="margin-left:auto;">✎ New melody</button>
  </div>
  <div id="staff-container">
    <canvas id="staff-canvas"></canvas>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  SAVED MELODIES — edit this list to add your own before lessons
//  Format: { name: "Display Name", notes: "C D E F G" }
//  Tempo is always set by the student on the first screen.
//  Q = quarter (default), H = half, W = whole, E = eighth, DQ = dotted quarter
//  e.g. C4 D4H E4E F4E G4DQ A4E
// ═══════════════════════════════════════════════════════════════════
const SAVED_MELODIES = [
  { name: "C Major Scale",          notes: "C4 D4 E4 F4 G4 A4 B4 C5" },
  { name: "C Major Scale (mixed)",  notes: "C4H D4 E4H F4 G4H A4 B4 C5H" },
  { name: "G Major Scale",          notes: "G4 A4 B4 C5 D5 E5 F5 G5" },
  { name: "Mary Had a Little Lamb", notes: "E5 D5 C5 D5 E5 E5 E5H D5 D5 D5H E5 G5 G5H" },
  { name: "Hot Cross Buns",         notes: "E4 D4 C4H E4 D4 C4H C4 C4 C4 C4 D4 D4 D4 D4 E4 D4 C4H" },
  { name: "Ode to Joy",             notes: "E5 E5 F5 G5 G5 F5 E5 D5 C5 C5 D5 E5 E5H D5 D5H" },
  { name: "Go Tell Aunt Rhody",     notes: "E5H E5 D5 C5H C5H D5H D5 F5 E5 D5 C5H G5H G5 F5 E5H E5 E5 D5 C5 D5 E5 C5W" },
];
// ═══════════════════════════════════════════════════════════════════

const STEPS = ['tempo', 'melody'];
let stepIndex = 0;
let collectedTempo = 60;

const promptScreen      = document.getElementById('prompt-screen');
const promptLabel       = document.getElementById('prompt-label');
const promptSublabel    = document.getElementById('prompt-sublabel');
const promptInput       = document.getElementById('prompt-input');
const promptInputMelody = document.getElementById('prompt-input-melody');
const melodySelect      = document.getElementById('melody-select');
const melodyStep        = document.getElementById('melody-step');
const promptBtn         = document.getElementById('prompt-btn');
const promptError       = document.getElementById('prompt-error');
const promptHint        = document.getElementById('prompt-hint');
const appDiv            = document.getElementById('app');

// Populate dropdown from SAVED_MELODIES
SAVED_MELODIES.forEach((m, i) => {
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = m.name;
  melodySelect.appendChild(opt);
});

// When a saved melody is chosen, pre-fill the notes input
melodySelect.addEventListener('change', () => {
  const idx = melodySelect.value;
  if (idx === '') { promptInputMelody.value = ''; return; }
  promptInputMelody.value = SAVED_MELODIES[idx].notes;
});

function showStep(step) {
  promptError.textContent = '';
  if (step === 'tempo') {
    promptLabel.textContent    = 'What tempo?';
    promptSublabel.textContent = 'Enter beats per minute';
    promptInput.style.display  = '';
    melodyStep.classList.remove('visible');
    promptInput.value      = '';
    promptBtn.textContent  = 'Next →';
    promptHint.textContent = 'Press Enter or tap Next';
    setTimeout(() => promptInput.focus(), 60);
  } else {
    promptLabel.textContent    = 'Choose or type a melody.';
    promptSublabel.textContent = 'Q=quarter  H=half  W=whole  E=eighth  DQ=dotted quarter';
    promptInput.style.display  = 'none';
    melodyStep.classList.add('visible');
    promptInputMelody.value = '';
    melodySelect.value      = '';
    promptBtn.textContent   = 'Play →';
    promptHint.textContent  = 'Pick from the list, or type notes below. Press Enter when done.';
    setTimeout(() => melodySelect.focus(), 60);
  }
}

function advancePrompt() {
  promptError.textContent = '';
  const step = STEPS[stepIndex];

  if (step === 'tempo') {
    const val = promptInput.value.trim();
    const n   = parseInt(val);
    if (!val || isNaN(n) || n < 20 || n > 240) {
      promptError.textContent = 'Please enter a number between 20 and 240.';
      promptInput.focus();
      return;
    }
    collectedTempo = n;
    stepIndex++;
    showStep(STEPS[stepIndex]);

  } else if (step === 'melody') {
    const notesStr = promptInputMelody.value.trim();
    const selIdx   = melodySelect.value;
    const src      = notesStr || (selIdx !== '' ? SAVED_MELODIES[selIdx].notes : '');
    const parsed   = parseInput(src);
    if (parsed.length === 0) {
      promptError.textContent = 'No valid notes found. Try:  C D E F G';
      promptInputMelody.focus();
      return;
    }
    const melodyName = (!notesStr && selIdx !== '') ? SAVED_MELODIES[selIdx].name : '';
    launchApp(collectedTempo, parsed, melodyName);
  }
}

promptBtn.addEventListener('click', advancePrompt);
promptInput.addEventListener('keydown',       e => { if (e.key === 'Enter') { e.preventDefault(); advancePrompt(); } });
promptInputMelody.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); advancePrompt(); } });
melodySelect.addEventListener('keydown',      e => { if (e.key === 'Enter') { e.preventDefault(); advancePrompt(); } });

function launchApp(bpm, parsed, melodyName) {
  promptScreen.classList.add('hidden');
  appDiv.classList.remove('hidden');
  tempoValue   = bpm;
  beatDuration = 60000 / bpm;
  const label  = (melodyName ? melodyName + '  ·  ' : '') + bpm + ' BPM';
  document.getElementById('info-display').textContent = label;
  resize();
  buildNotes(parsed);
}

document.getElementById('restart-btn').addEventListener('click', () => {
  isPlaying   = false;
  worldOffset = 0;
  appDiv.classList.add('hidden');
  promptScreen.classList.remove('hidden');
  stepIndex = 0;
  showStep(STEPS[0]);
});

// ── Note definitions ──────────────────────────────────────────────
const NOTE_STEPS = {
  'C4': -2, 'D4': -1, 'E4': 0,  'F4': 1,  'G4': 2,
  'A4': 3,  'B4': 4,  'C5': 5,  'D5': 6,  'E5': 7,
  'F5': 8,  'G5': 9,  'A5': 10, 'B5': 11, 'C6': 12
};
const DEFAULT_OCTAVE = { 'C': 5, 'D': 5, 'E': 4, 'F': 4, 'G': 4, 'A': 4, 'B': 4 };

function parseInput(str) {
  const tokens = str.trim().toUpperCase().split(/[\s,]+/).filter(Boolean);
  const result = [];
  for (const tok of tokens) {
    const letter = tok[0];
    if (!'CDEFGAB'.includes(letter)) continue;
    let duration = 'Q';
    let inner = tok;
    if (tok.endsWith('DQ'))     { duration = 'DQ'; inner = tok.slice(0, -2); }
    else if (tok.endsWith('W')) { duration = 'W';  inner = tok.slice(0, -1); }
    else if (tok.endsWith('H')) { duration = 'H';  inner = tok.slice(0, -1); }
    else if (tok.endsWith('E')) { duration = 'E';  inner = tok.slice(0, -1); }
    const octave = inner.length > 1 ? parseInt(inner.slice(1)) : DEFAULT_OCTAVE[letter];
    const key = letter + octave;
    if (NOTE_STEPS.hasOwnProperty(key)) result.push({ step: NOTE_STEPS[key], duration });
  }
  return result;
}
 
// ── Canvas / layout ────────────────────────────────────────────────
const canvas = document.getElementById('staff-canvas');
const ctx    = canvas.getContext('2d');
let W, H, staffTop, staffBottom, lineSpacing, noteRadius, playheadX, pixelsPerBeat;
const NUM_LINES          = 5;
const NOTE_SPACING_BEATS = 1.5;

function resize() {
  W = canvas.offsetWidth;
  H = canvas.offsetHeight;
  canvas.width  = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const staffHeight = H * 0.55;
  const staffCenter = H * 0.48;
  staffTop      = staffCenter - staffHeight / 2;
  staffBottom   = staffCenter + staffHeight / 2;
  lineSpacing   = staffHeight / (NUM_LINES - 1);
  noteRadius    = lineSpacing * 0.55;
  playheadX     = W / 3;
  pixelsPerBeat = lineSpacing * NOTE_SPACING_BEATS * 2;
  draw();
}

// ── Playback state ─────────────────────────────────────────────────
let notes        = [];
let worldOffset  = 0;
let isPlaying    = false;
let lastTimestamp = null;
let beatDuration = 1000;
let tempoValue   = 60;

// ── Metronome ─────────────────────────────────────────────────────
let audioCtx = null;
let metronomeInterval = null;
let clickCount = 0;
const COUNT_IN = 4;
const LOOKAHEAD = 0.1; // seconds to schedule ahead

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function scheduleClick(time) {
  const actx = getAudioCtx();
  const osc  = actx.createOscillator();
  const gain = actx.createGain();
  osc.connect(gain);
  gain.connect(actx.destination);
  osc.frequency.value = 880;
  gain.gain.setValueAtTime(0.3, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
  osc.start(time);
  osc.stop(time + 0.05);
}

function startMetronome() {
  const actx = getAudioCtx();
  clickCount = 0;
  let nextClickTime = actx.currentTime + 0.05;
  let scrollStarted = false;

  // Schedule clicks slightly ahead using a fast polling interval
  metronomeInterval = setInterval(() => {
    while (nextClickTime < actx.currentTime + LOOKAHEAD) {
      scheduleClick(nextClickTime);
      clickCount++;

      if (clickCount === COUNT_IN + 1 && !scrollStarted) {
        // This is beat 1 of the melody — start scroll now
        scrollStarted = true;
        lastTimestamp = null;
        requestAnimationFrame(scrollTick);
      }

      nextClickTime += beatDuration / 1000;
    }
  }, 25);
}

function stopMetronome() {
  if (metronomeInterval) { clearInterval(metronomeInterval); metronomeInterval = null; }
}

function buildNotes(parsed) {
  let x = 0;
  notes = parsed.map(n => {
    const note = { step: n.step, duration: n.duration, x };
    switch (n.duration) {
      case 'W':  x += pixelsPerBeat * 4;   break;
      case 'H':  x += pixelsPerBeat * 2;   break;
      case 'E':  x += pixelsPerBeat * 0.5; break;
      case 'DQ': x += pixelsPerBeat * 1.5; break;
      default:   x += pixelsPerBeat;       break;
    }
    return note;
  });
  worldOffset   = 0;
  isPlaying     = false;
  lastTimestamp = null;
  document.getElementById('play-btn').textContent = '▶ Play (Space)';
  draw();
}
 
// ── Drawing ────────────────────────────────────────────────────────
function staffY(step) { return staffBottom - step * (lineSpacing / 2); }

function draw() {
  if (!W) return;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);
  drawStaff();
  drawBarLines();
  drawNotes();
}

function drawStaff() {
  ctx.strokeStyle = '#111';
  ctx.lineWidth   = 12;
  for (let i = 0; i < NUM_LINES; i++) {
    const y = staffBottom - i * lineSpacing;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawBarLines() {
  const barWidth      = pixelsPerBeat * 4;
  const firstBarWorld = -pixelsPerBeat * 0.5;
  const startWorld    = worldOffset - playheadX - barWidth;
  const endWorld      = worldOffset - playheadX + W + barWidth;
  const startBar      = Math.floor((startWorld - firstBarWorld) / barWidth);
  const endBar        = Math.ceil( (endWorld   - firstBarWorld) / barWidth);
  ctx.strokeStyle = '#111';
  ctx.lineWidth   = 12;
  for (let b = startBar; b <= endBar; b++) {
    const screenX = (firstBarWorld + b * barWidth) - worldOffset + playheadX;
    ctx.beginPath(); ctx.moveTo(screenX, staffTop); ctx.lineTo(screenX, staffBottom); ctx.stroke();
  }
}

function drawNotes() {
  // First pass: draw all non-eighth notes and note heads for eighths
  for (let i = 0; i < notes.length; i++) {
    const note = notes[i];
    const screenX = note.x - worldOffset + playheadX;
    if (screenX < -noteRadius * 4 || screenX > W + noteRadius * 4) continue;
    drawNote(screenX, staffY(note.step), note.step, note.duration);
  }

  // Second pass: draw beams between consecutive eighth notes
  let i = 0;
  while (i < notes.length) {
    if (notes[i].duration === 'E') {
      // Find run of consecutive eighths
      let j = i + 1;
      while (j < notes.length && notes[j].duration === 'E') j++;
      const group = notes.slice(i, j);
      // Beam in pairs
      for (let k = 0; k < group.length; k += 2) {
        const n1 = group[k];
        const n2 = group[k + 1];
        const x1 = n1.x - worldOffset + playheadX;
        if (n2) {
          const x2 = n2.x - worldOffset + playheadX;
          drawBeam(x1, n1.step, x2, n2.step);
        }
        // Unpaired eighth gets a flag instead
        else {
          drawFlag(x1, n1.step);
        }
      }
      i = j;
    } else {
      i++;
    }
  }
}
 
function drawNote(x, y, step, duration) {
  const r = noteRadius;
  // Ledger lines below
  if (step <= -2) {
    for (let s = -2; s >= step; s -= 2) {
      ctx.strokeStyle = '#111'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(x - r*1.7, staffY(s)); ctx.lineTo(x + r*1.7, staffY(s)); ctx.stroke();
    }
  }
  // Ledger lines above
  if (step >= 10) {
    for (let s = 10; s <= step; s += 2) {
      ctx.strokeStyle = '#111'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(x - r*1.7, staffY(s)); ctx.lineTo(x + r*1.7, staffY(s)); ctx.stroke();
    }
  }
  // Note head
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(-0.2);
  ctx.beginPath();
  ctx.ellipse(0, 0, r*1.15, r*0.82, 0, 0, Math.PI*2);
  if (duration === 'H' || duration === 'W') {
    ctx.strokeStyle = '#111'; ctx.lineWidth = r * 0.45; ctx.stroke();
  } else {
    ctx.fillStyle = '#111'; ctx.fill();
  }
  ctx.restore();
  // No stem for whole notes
  if (duration === 'W') return;
  // Stem
  const stemHeight = lineSpacing * 3.5;
  ctx.strokeStyle = '#111'; ctx.lineWidth = 10;
  const stemUp = step < 4;
  ctx.beginPath();
  if (!stemUp) {
    ctx.moveTo(x - r*0.9, y + r*0.4);
    ctx.lineTo(x - r*0.9, y + stemHeight);
  } else {
    ctx.moveTo(x + r*0.9, y - r*0.4);
    ctx.lineTo(x + r*0.9, y - stemHeight);
  }
  ctx.stroke();
  // Dot for dotted quarter
  if (duration === 'DQ') {
    ctx.beginPath();
    ctx.arc(x + r*1.7, y - r*0.3, r*0.28, 0, Math.PI*2);
    ctx.fillStyle = '#111'; ctx.fill();
  }
}

function drawBeam(x1, step1, x2, step2) {
  const stemUp1 = step1 < 4;
  const stemUp2 = step2 < 4;
  const stemHeight = lineSpacing * 3.5;
  const r = noteRadius;
  const y1 = staffY(step1) + (stemUp1 ? -stemHeight : stemHeight);
  const y2 = staffY(step2) + (stemUp2 ? -stemHeight : stemHeight);
  const bx1 = stemUp1 ? x1 + r*0.9 : x1 - r*0.9;
  const bx2 = stemUp2 ? x2 + r*0.9 : x2 - r*0.9;
  ctx.strokeStyle = '#111';
  ctx.lineWidth = lineSpacing * 0.2;
  ctx.lineCap = 'butt';
  ctx.beginPath();
  ctx.moveTo(bx1, y1);
  ctx.lineTo(bx2, y2);
  ctx.stroke();
  ctx.lineCap = 'round';
}

function drawFlag(x, step) {
  const stemUp = step < 4;
  const stemHeight = lineSpacing * 3.5;
  const r = noteRadius;
  const stemX = stemUp ? x + r*0.9 : x - r*0.9;
  const stemTipY = staffY(step) + (stemUp ? -stemHeight : stemHeight);
  // Simple curved flag
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 10;
  ctx.beginPath();
  ctx.moveTo(stemX, stemTipY);
  if (stemUp) {
    ctx.bezierCurveTo(stemX + lineSpacing*1.2, stemTipY + lineSpacing*0.5,
                      stemX + lineSpacing*1.2, stemTipY + lineSpacing*1.2,
                      stemX + lineSpacing*0.3, stemTipY + lineSpacing*1.6);
  } else {
    ctx.bezierCurveTo(stemX - lineSpacing*1.2, stemTipY - lineSpacing*0.5,
                      stemX - lineSpacing*1.2, stemTipY - lineSpacing*1.2,
                      stemX - lineSpacing*0.3, stemTipY - lineSpacing*1.6);
  }
  ctx.stroke();
}
 
// ── Playback ───────────────────────────────────────────────────────
function togglePlay() {
  if (!notes.length) return;
  if (audioCtx) audioCtx.resume();
  isPlaying = !isPlaying;
  document.getElementById('play-btn').textContent = isPlaying ? '⏸ Pause (Space)' : '▶ Play (Space)';
  if (isPlaying) {
    worldOffset = 0;
    startMetronome();
  } else {
    stopMetronome();
  }
}

function scrollTick(ts) {
  if (!isPlaying) return;
  if (lastTimestamp === null) lastTimestamp = ts;
  const dt = ts - lastTimestamp; lastTimestamp = ts;
  worldOffset += dt * (pixelsPerBeat / beatDuration);
  const last = notes[notes.length - 1];
  const lastDur = last.duration;
  const lastBeats = lastDur === 'W' ? 4 : lastDur === 'H' ? 2 : lastDur === 'E' ? 0.5 : lastDur === 'DQ' ? 1.5 : 1;
  const lastEnd = last.x + pixelsPerBeat * lastBeats;
  if (last && (lastEnd - worldOffset + playheadX) < -noteRadius * 6) {
    isPlaying = false;
    stopMetronome();
    document.getElementById('play-btn').textContent = '▶ Play (Space)';
    worldOffset = 0; draw(); return;
  }
  draw(); requestAnimationFrame(scrollTick);
}

document.getElementById('play-btn').addEventListener('click', togglePlay);
document.getElementById('reset-btn').addEventListener('click', () => {
  isPlaying = false;
  stopMetronome();
  worldOffset = 0; lastTimestamp = null;
  document.getElementById('play-btn').textContent = '▶ Play (Space)';
  draw();
});

window.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') {
    e.preventDefault(); togglePlay();
  }
});

window.addEventListener('resize', () => {
  if (!appDiv.classList.contains('hidden')) resize();
});

// ── Init ───────────────────────────────────────────────────────────
showStep(STEPS[0]);
</script>
